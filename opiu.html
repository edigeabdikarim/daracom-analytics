<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ОПиУ · Daracom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            pageBg: '#F8F9FC',
            surface: '#FFFFFF',
            border: '#E5E7EB',
            textMain: '#111827',
            textMuted: '#6B7280',
            accent: '#10B981',
          },
          fontFamily: { sans: ['Manrope', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    * { box-sizing: border-box; }
    body { background: #F8F9FC; color: #111827; font-family: 'Manrope', sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #F1F5F9; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }

    .loader { border: 3px solid #E5E7EB; border-top-color: #10B981; border-radius: 50%; width: 36px; height: 36px; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ОПиУ Matrix Table ── */
    .om-wrap { overflow-x: auto; background: #fff; border: 2px solid #1E3A5F; border-radius: 12px; }
    .om-table { width: 100%; border-collapse: collapse; font-size: 12px; border: 2px solid #1E3A5F; }

    /* Header */
    .om-table th { padding: 9px 10px; text-align: right; font-size: 11px; font-weight: 700;
      color: #fff; background: #1E3A5F; text-transform: uppercase; letter-spacing: 0.04em;
      border: 1px solid #2d4e73; white-space: nowrap; position: sticky; top: 0; z-index: 3; }
    .om-table th.om-th-metric { text-align: left; position: sticky; left: 0; z-index: 4;
      width: 220px; min-width: 220px; background: #1E3A5F; border-left: 2px solid #1E3A5F; }
    .om-table th.om-th-total { position: sticky; left: 220px; z-index: 4;
      background: #15803D; border-color: #166534; }

    /* Cells */
    .om-table td { padding: 8px 10px; border: 1px solid #9CA3AF; text-align: right; white-space: nowrap; color: #111827; }
    .om-table td:first-child { text-align: left; position: sticky; left: 0; background: #fff;
      z-index: 1; width: 220px; max-width: 280px; white-space: normal; word-break: break-word;
      border-left: 2px solid #1E3A5F; }
    .om-table td:last-child { border-right: 2px solid #1E3A5F; }
    .om-table td.om-td-total { position: sticky; left: 220px; z-index: 1; font-weight: 700;
      background: #fff; border-left: 2px solid #D1FAE5; border-right: 2px solid #D1FAE5; }
    .om-table td.om-cw-cell { text-align: center; }

    /* L0 row — Выручка */
    .om-l0-row td { background: #1E3A5F !important; color: #fff; font-weight: 700;
      font-size: 13px; border-top: 2px solid #1E3A5F; border-bottom: 2px solid #1E3A5F; }
    .om-l0-row td:first-child { padding-left: 12px; background: #1E3A5F !important; }
    .om-l0-row td.om-td-total { background: #15803D !important; }

    /* L1 row — Производственные, Косвенные */
    .om-l1-row td { background: #162D4A !important; color: #fff; font-weight: 700;
      font-size: 13px; border-top: 3px solid #1E3A5F; border-bottom: 2px solid #1E3A5F; }
    .om-l1-row td:first-child { padding-left: 12px; background: #162D4A !important; }
    .om-l1-row td.om-td-total { background: #0F4C2A !important; }

    /* L2 row — подгруппы */
    .om-l2-row td { background: #FFF7ED !important; color: #7C2D12; font-weight: 700;
      font-size: 12px; border-top: 2px solid #1E3A5F; border-bottom: 2px solid #1E3A5F; }
    .om-l2-row td:first-child { padding-left: 20px; background: #FFF7ED !important; }
    .om-l2-row td.om-td-total { background: #FEF3C7 !important; }

    /* Calc rows — Маржинальный доход, Валовая прибыль, etc */
    .om-calc-row td { background: #ECFDF5 !important; color: #065F46; font-weight: 700;
      font-size: 13px; border-top: 3px solid #1E3A5F; border-bottom: 2px solid #1E3A5F; }
    .om-calc-row td:first-child { padding-left: 12px; background: #ECFDF5 !important; }
    .om-calc-row td.om-td-total { background: #D1FAE5 !important; }

    /* Article rows */
    .om-article-row td { background: #fff; }
    .om-article-row td:first-child { padding-left: 28px; font-size: 12px; font-weight: 400;
      color: #374151; background: #fff; }
    .om-article-row.om-alt td { background: #F9FAFB; }
    .om-article-row.om-alt td:first-child { background: #F9FAFB; }
    .om-article-row.om-alt td.om-td-total { background: #F0FDF4; }
    .om-article-row td.om-td-total { background: #F0FDF4; }
    .om-table tr.om-article-row:hover td { background: #F0F9FF !important; }
    .om-table tr.om-article-row:hover td.om-td-total { background: #DCFCE7 !important; }

    /* Value + pct */
    .om-val { font-weight: 600; }
    .om-val.om-positive { color: inherit; }
    .om-val.om-negative { color: #DC2626; }
    .om-pct { font-size: 10px; color: #9CA3AF; margin-top: 1px; }
    .om-pct-total { font-size: 10px; color: #6EE7B7; margin-top: 1px; }
    .om-zero { color: #D1D5DB; }

    /* Print header */
    #opiuPrintHeader { display: none; margin-bottom: 12px; }
    .ph-title { font-size: 14px; font-weight: 700; color: #111827; }
    .ph-month { font-size: 13px; color: #6B7280; margin-left: 8px; }

    /* Print */
    .print-btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px;
      font-size: 13px; font-weight: 500; color: #374151; background: #F3F4F6;
      border: 1px solid #D1D5DB; border-radius: 6px; cursor: pointer;
      transition: background 0.15s; font-family: 'Manrope', sans-serif; }
    .print-btn:hover { background: #E5E7EB; }
    @page { size: A4 landscape; margin: 1cm; }
    @media print {
      header, .print-btn { display: none !important; }
      #opiuPrintHeader { display: block !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      #stateContent { padding: 0 !important; }
      .om-wrap { overflow: visible !important; border: none !important; border-radius: 0 !important; }
      .om-table thead { display: table-header-group; }
      .om-table th, .om-table td { position: static !important; }
      .om-table th, .om-table td,
      .om-l0-row td, .om-l1-row td, .om-l2-row td, .om-calc-row td { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      @page { @bottom-right { content: "Стр. " counter(page); font-size: 9pt; color: #9CA3AF; } }
    }
  </style>
</head>
<body class="min-h-screen">

  <!-- ═══ КОНФИГУРАЦИЯ ═══ -->
  <script>
    const CONFIG = {
      GAS_URL: 'https://script.google.com/macros/s/AKfycbyukzkRocAiDyYN2CVQcuVi2FXDUOOjL4qofWMnoK3PaiEpaqF3ojpE2u0JsKEYFwYprA/exec',
      CACHE_TTL_MS: 30 * 60 * 1000,
    };
    const MONTH_NAMES = ['','Январь','Февраль','Март','Апрель','Май','Июнь',
                          'Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
    const GROUP_BG = {
      'Выручка': 'bg-income',
      'Переменные': 'bg-expense',
      'Маржинальный доход': 'bg-income',
      'Прямые постоянные': 'bg-expense',
      'Валовая прибыль по направлениям': 'bg-income',
    };
    // Строки выручки — не показываем % (сами являются базой)
    const NO_PCT_LABELS = new Set(['Выручка']);
  </script>

  <!-- ═══ HEADER ═══ -->
  <header class="sticky top-0 z-20 bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between shadow-sm">
    <div class="flex items-center gap-2">
      <span class="font-bold text-gray-900 text-base">ОПиУ · Daracom</span>
      <span class="text-gray-300 mx-1">·</span>
      <span class="text-sm text-gray-500" id="headerSub">Загрузка…</span>
    </div>
    <div class="flex items-center gap-2">
      <a href="dashboard.html" class="text-sm text-gray-500 hover:text-gray-900 font-medium px-3 py-1.5 rounded-lg border border-gray-200 hover:border-gray-300 transition-colors">← Финотчёт</a>
      <a href="dds.html" class="text-sm text-gray-500 hover:text-gray-900 font-medium px-3 py-1.5 rounded-lg border border-gray-200 hover:border-gray-300 transition-colors">ДДС →</a>
      <button onclick="refreshData()" class="text-sm font-semibold px-3 py-1.5 rounded-lg border border-gray-200 hover:border-green-500 hover:text-green-600 text-gray-600 transition-colors">↻ Обновить</button>
      <select id="monthSel" onchange="onMonthChange()" class="border border-gray-200 text-sm rounded-lg px-3 py-1.5 bg-white text-gray-800 outline-none focus:ring-1 focus:ring-green-500 font-medium cursor-pointer">
        <option value="1">Январь</option><option value="2">Февраль</option>
        <option value="3">Март</option><option value="4">Апрель</option>
        <option value="5">Май</option><option value="6">Июнь</option>
        <option value="7">Июль</option><option value="8">Август</option>
        <option value="9">Сентябрь</option><option value="10">Октябрь</option>
        <option value="11">Ноябрь</option><option value="12">Декабрь</option>
      </select>
    </div>
  </header>

  <!-- ═══ STATES ═══ -->
  <div id="stateLoading" class="flex flex-col items-center justify-center min-h-[60vh] gap-4">
    <div class="loader"></div>
    <p class="text-gray-400 text-sm font-medium">Загрузка данных ОПиУ…</p>
  </div>

  <div id="stateError" class="hidden flex-col items-center justify-center min-h-[60vh] gap-4 px-6">
    <div class="text-4xl">⚠️</div>
    <p class="text-gray-700 font-semibold" id="errorMsg">Ошибка загрузки</p>
    <button onclick="loadData()" class="px-4 py-2 bg-gray-900 text-white text-sm font-semibold rounded-lg hover:bg-gray-700">Повторить</button>
  </div>

  <div id="stateEmpty" class="hidden flex-col items-center justify-center min-h-[60vh] gap-4">
    <div class="text-4xl">📭</div>
    <p class="text-gray-500 font-medium">Нет данных за выбранный месяц</p>
  </div>

  <!-- ═══ CONTENT ═══ -->
  <main id="stateContent" class="hidden px-6 py-6 max-w-screen-2xl mx-auto">
    <div class="pl-wrap">
      <table class="pl-table" id="plTable">
        <thead id="plHead"></thead>
        <tbody id="plBody"></tbody>
      </table>
    </div>
  </main>

  <script>
  // ─── STATE ─────────────────────────────────────
  let currentMonth = new Date().getMonth() + 1;
  let currentData = null;

  // ─── INIT ──────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    const sel = document.getElementById('monthSel');
    sel.value = currentMonth;
    loadData();
  });

  function onMonthChange() {
    currentMonth = parseInt(document.getElementById('monthSel').value);
    loadData();
  }

  // ─── CACHE ─────────────────────────────────────
  const CACHE_YEAR = new Date().getFullYear();
  function cacheKey(m) { return 'daracom_opiu_' + CACHE_YEAR + '_' + m; }

  function refreshData() {
    localStorage.removeItem(cacheKey(currentMonth));
    loadData(true);
  }

  function loadFromCache(m) {
    try {
      const raw = localStorage.getItem(cacheKey(m));
      if (!raw) return null;
      const { ts, data } = JSON.parse(raw);
      if (Date.now() - ts < CONFIG.CACHE_TTL_MS) return { data, ts };
    } catch(e) {}
    return null;
  }

  function saveToCache(m, data) {
    try {
      localStorage.setItem(cacheKey(m), JSON.stringify({ ts: Date.now(), data }));
    } catch(e) {}
  }

  // ─── FETCH ─────────────────────────────────────
  async function loadData(forceRefresh = false) {
    setState('loading');

    if (!forceRefresh) {
      const cached = loadFromCache(currentMonth);
      if (cached) {
        renderDashboard(cached.data, cached.ts);
        return;
      }
    }

    try {
      const url = CONFIG.GAS_URL + '?action=opiu&month=' + currentMonth;
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const json = await res.json();
      if (!json.ok) throw new Error(json.error || 'Ошибка GAS');
      saveToCache(currentMonth, json.data);
      renderDashboard(json.data, Date.now());
    } catch(err) {
      showError(err.message);
    }
  }

  // ─── STATES ────────────────────────────────────
  function setState(s) {
    ['loading','error','empty','content'].forEach(id => {
      const el = document.getElementById('state' + id.charAt(0).toUpperCase() + id.slice(1));
      if (!el) return;
      el.classList.toggle('hidden', id !== s);
      el.classList.toggle('flex', id === s && s !== 'content');
    });
  }

  function showError(msg) {
    document.getElementById('errorMsg').textContent = msg;
    setState('error');
  }

  // ─── FORMAT ────────────────────────────────────
  function fmtShort(n) {
    if (Math.abs(n) >= 1e9) return (n / 1e9).toFixed(1) + ' млрд';
    if (Math.abs(n) >= 1e6) return (n / 1e6).toFixed(1) + ' млн';
    if (Math.abs(n) >= 1e3) return (n / 1e3).toFixed(0) + ' тыс';
    return String(Math.round(n));
  }

  // ─── RENDER ────────────────────────────────────
  function renderDashboard(data, ts) {
    if (!data || !data.rows || data.rows.length === 0) {
      setState('empty');
      return;
    }
    currentData = data;

    // Header subtitle
    const d = new Date(ts);
    const hhmm = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
    document.getElementById('headerSub').textContent = MONTH_NAMES[data.month] + ' ' + CACHE_YEAR + ' · данные от ' + hhmm;

    // Build revenue map: store → revenue value (for % calc per store)
    const revenueMap = {};
    const revRow = data.rows.find(r => r.label === 'Выручка');
    if (revRow) {
      data.stores.forEach(s => { revenueMap[s] = revRow.values[s] || 0; });
      revenueMap['Итого'] = revRow.values['Итого'] || 0;
    }

    const cols = [...data.stores]; // без Итого — он отдельно вторым

    // Render thead: Метрика | Итого | store1 | store2 | ...
    const thead = document.getElementById('plHead');
    thead.innerHTML = '<tr>' +
      '<th>Метрика</th>' +
      '<th class="th-total">Итого</th>' +
      cols.map(s => '<th>' + escHtml(s.replace('Магазин ', '')) + '</th>').join('') +
      '</tr>';

    // Render tbody
    const tbody = document.getElementById('plBody');
    tbody.innerHTML = data.rows.map(row => renderRow(row, cols, revenueMap)).join('');

    setState('content');
  }

  function renderRow(row, cols, revenueMap) {
    const isGroup   = row.type === 'group';
    const isMerged  = !!row.merged;
    const isPct     = !!row.pct;
    const noPercent = NO_PCT_LABELS.has(row.label) || row.parent === 'Выручка';

    const bgCls  = isGroup ? (GROUP_BG[row.label] || '') : '';
    const isNetGroup = isMerged && isGroup;
    const isNetItem  = isMerged && !isGroup;

    let rowCls;
    if (isNetGroup)       rowCls = 'pl-row-net-group';
    else if (isNetItem)   rowCls = 'pl-row-net-item';
    else if (isGroup)     rowCls = 'pl-row-group ' + bgCls;
    else                  rowCls = 'pl-row-item';

    // ── Итого cell ──
    const totalVal = row.values['Итого'];
    const totalRevenue = revenueMap['Итого'] || 0;
    const totalCell = buildCell(totalVal, totalRevenue, noPercent, isPct, true, isMerged);
    const totalTd = '<td class="td-total">' + totalCell + '</td>';

    if (isMerged) {
      // Merged rows: colspan по всем магазинам
      const spanVal  = totalVal !== null && totalVal !== undefined && totalVal !== 0 ? fmtShort(totalVal) : '';
      const spanPct  = (!noPercent && totalRevenue > 0 && totalVal)
        ? '<div class="cell-pct-net">(' + (totalVal / totalRevenue * 100).toFixed(1) + '%)</div>'
        : '';
      const spanContent = spanVal
        ? '<div class="cell-val">' + spanVal + '</div>' + spanPct
        : '';
      const spanTd = '<td class="td-net-span" colspan="' + cols.length + '">' + spanContent + '</td>';

      return '<tr class="' + rowCls + '">' +
        '<td>' + escHtml(row.label) + '</td>' +
        totalTd +
        spanTd +
        '</tr>';
    }

    // Normal rows: individual store cells
    const storeCells = cols.map(col => {
      const val = row.values[col];
      const rev = revenueMap[col] || 0;
      return '<td>' + buildCell(val, rev, noPercent, isPct, false, false) + '</td>';
    }).join('');

    return '<tr class="' + rowCls + '">' +
      '<td>' + escHtml(row.label) + '</td>' +
      totalTd +
      storeCells +
      '</tr>';
  }

  function buildCell(val, rev, noPercent, isPct, isTotal, isMerged) {
    if (val === undefined || val === null || val === 0) {
      return '<span class="cell-dash">—</span>';
    }

    // % строки (Рентабельность)
    if (isPct) {
      const pctStr = (val * 100).toFixed(1) + '%';
      const color  = val < 0 ? '#EF4444' : '#10B981';
      return '<div class="cell-val" style="color:' + color + '">' + pctStr + '</div>';
    }

    const fmtVal = fmtShort(val);

    if (noPercent) {
      return '<div class="cell-val">' + fmtVal + '</div>';
    }

    if (rev === 0) {
      return '<span class="cell-dash">—</span>';
    }

    const pct = (val / rev * 100).toFixed(1);
    const pctCls = isTotal ? 'cell-pct-total' : 'cell-pct';
    return '<div class="cell-val">' + fmtVal + '</div>' +
           '<div class="' + pctCls + '">(' + pct + '%)</div>';
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  </script>

</body>
</html>
